[phases.setup]
nixPkgs = ["python311", "chromium", "glib", "nss", "nspr", "atk", "cups", "dbus", "expat", "libdrm", "libxcb", "libxkbcommon", "mesa", "pango", "cairo", "freetype", "fontconfig", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxshmfence", "alsa-lib"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "python -m playwright install chromium || true",
  "python -m playwright install-deps chromium || true"
]

[start]
cmd = "python main.py"
