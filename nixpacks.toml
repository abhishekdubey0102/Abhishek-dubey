[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3.11 -m pip install telethon==1.28.5 aiohttp==3.9.1",
  "python3.11 -m pip install playwright==1.40.0",
  "python3.11 -m playwright install chromium",
  "python3.11 -m playwright install-deps chromium"
]

[start]
cmd = "python3.11 main.py"
